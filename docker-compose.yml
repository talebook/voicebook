services:
  ollama:
    image: ollama/ollama:latest
    container_name: novel-llm
    ports:
      - "11434:11434"
    volumes:
      - ./models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # FastAPI 服务
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: novel-api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - MODEL_NAME=qwen3:0.6b
    depends_on:
      - ollama
    volumes:
      - ./app:/app
      - ./data:/data
    restart: unless-stopped

networks:
  default:
    name: novel-network
